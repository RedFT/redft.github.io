<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" style="background-color:#020617;width:100%;height:auto;">
  <defs>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" />
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399" />
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa" />
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- LAPTOP BOUNDARY -->
  <rect x="20" y="40" width="220" height="360" rx="12" fill="rgba(8, 51, 68, 0.05)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="32" y="58" fill="#22d3ee" font-size="10" font-weight="600">Laptop (Client)</text>

  <!-- Jan -->
  <rect x="40" y="80" width="180" height="60" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="130" y="102" fill="white" font-size="11" font-weight="600" text-anchor="middle">Jan</text>
  <text x="130" y="118" fill="#94a3b8" font-size="9" text-anchor="middle">Desktop Chat GUI</text>

  <!-- OpenCode -->
  <rect x="40" y="170" width="180" height="60" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="130" y="192" fill="white" font-size="11" font-weight="600" text-anchor="middle">OpenCode</text>
  <text x="130" y="208" fill="#94a3b8" font-size="9" text-anchor="middle">AI Coding Agent</text>

  <!-- Other clients -->
  <rect x="40" y="260" width="180" height="60" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="130" y="282" fill="white" font-size="11" font-weight="600" text-anchor="middle">Other Clients</text>
  <text x="130" y="298" fill="#94a3b8" font-size="9" text-anchor="middle">OpenAI-Compatible Apps</text>

  <!-- DESKTOP BOUNDARY -->
  <rect x="290" y="40" width="280" height="380" rx="12" fill="rgba(6, 78, 59, 0.05)" stroke="#34d399" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="302" y="58" fill="#34d399" font-size="10" font-weight="600">Desktop Server</text>

  <!-- Nginx -->
  <rect x="340" y="90" width="180" height="60" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="430" y="112" fill="white" font-size="11" font-weight="600" text-anchor="middle">Nginx</text>
  <text x="430" y="128" fill="#94a3b8" font-size="9" text-anchor="middle">Reverse Proxy</text>

  <!-- llama-server -->
  <rect x="340" y="200" width="180" height="60" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="430" y="222" fill="white" font-size="11" font-weight="600" text-anchor="middle">llama-server</text>
  <text x="430" y="238" fill="#94a3b8" font-size="9" text-anchor="middle">(llama.cpp)</text>

  <!-- GPU -->
  <rect x="320" y="320" width="220" height="70" rx="8" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="430" y="348" fill="white" font-size="12" font-weight="600" text-anchor="middle">GTX 1080 Ti</text>
  <text x="430" y="366" fill="#a78bfa" font-size="9" text-anchor="middle">11GB VRAM · 7B-13B Models</text>

  <!-- ARROWS -->

  <!-- Jan → Nginx -->
  <line x1="220" y1="110" x2="338" y2="120" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="279" y="105" fill="#94a3b8" font-size="9" text-anchor="middle">HTTPS</text>

  <!-- OpenCode → Nginx -->
  <line x1="220" y1="200" x2="338" y2="120" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow-cyan)"/>

  <!-- Nginx → llama-server -->
  <line x1="430" y1="150" x2="430" y2="198" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <text x="444" y="178" fill="#94a3b8" font-size="8">Proxy Pass</text>

  <!-- llama-server → GPU -->
  <line x1="430" y1="260" x2="430" y2="318" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <text x="444" y="294" fill="#94a3b8" font-size="8">Infer</text>
</svg>
